<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>ShieldCore // DEFENDER</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;background:#070707;overflow:hidden;
    font-family:'Press Start 2P',monospace;color:#E8C97A;cursor:none}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  canvas{image-rendering:pixelated;background:#0a0908;
    box-shadow:0 0 0 2px #7a6330,0 0 70px rgba(192,57,43,.25);max-width:100%;max-height:100%}
  #scan{position:fixed;inset:0;pointer-events:none;z-index:5;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.18) 0 1px,transparent 1px 3px);mix-blend-mode:multiply}
  #back{position:fixed;left:10px;bottom:8px;z-index:6;color:#7a6330;font-size:9px;text-decoration:none;letter-spacing:1px}
  #back:hover{color:#C9A84C}
</style>
</head>
<body>
<div id="wrap"><canvas id="c" width="760" height="760"></canvas></div>
<div id="scan"></div>
<a id="back" href="/">&lt; retour shieldcore.be</a>
<script>
const cv=document.getElementById('c'),x=cv.getContext('2d');
const W=cv.width,H=cv.height,CX=W/2,CY=H/2,R=30,HITR=40;
const GOLD='#C9A84C',GOLDL='#E8C97A',RED='#C0392B',REDB='#E74C3C',DIM='#7a6330',INK='#0a0908';
const THREATS=['SQLi','XSS','CSRF','RCE','CVE','BOT','0DAY','DDoS','MITM','LEAK','SPF','IDOR','PHISH','RANSOM'];
const LINES=['PERIMETRE TENU.','LE CORE RESISTE.','VULNS NEUTRALISEES.','ZERO JOUR, ZERO PEUR.','RIEN N\'EST PASSE.'];

let mouse={x:CX,y:CY-150},keys={},firing=false,state='title',shake=0,flash=0,muted=false;
let bullets,foes,parts,score,patched,hp,spawnT,spawnEvery,fireCd,endLine,wave,aim=-Math.PI/2;

function reset(){bullets=[];foes=[];parts=[];score=0;patched=0;hp=3;spawnT=0;spawnEvery=100;fireCd=0;flash=0;wave=1;endLine=LINES[(Math.random()*LINES.length)|0];}
function start(){reset();state='play';}

let AC;
function beep(f,d,type,v){if(muted)return;try{AC=AC||new (window.AudioContext||window.webkitAudioContext)();
  const o=AC.createOscillator(),g=AC.createGain();o.type=type||'square';o.frequency.value=f;g.gain.value=v||.04;
  o.connect(g);g.connect(AC.destination);o.start();g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+(d||.08));o.stop(AC.currentTime+(d||.08));}catch(e){}}

addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key===' ')e.preventDefault();
  if(e.key.toLowerCase()==='m')muted=!muted;
  if(state!=='play'&&(e.key===' '||e.key==='Enter'||e.key.toLowerCase()==='r'))start();});
addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
function setMouse(cx,cy){const r=cv.getBoundingClientRect();mouse.x=(cx-r.left)*(W/r.width);mouse.y=(cy-r.top)*(H/r.height);}
cv.addEventListener('mousemove',e=>setMouse(e.clientX,e.clientY));
cv.addEventListener('mousedown',()=>{if(state!=='play')start();else firing=true;});
addEventListener('mouseup',()=>firing=false);
addEventListener('touchstart',e=>{if(e.touches[0])setMouse(e.touches[0].clientX,e.touches[0].clientY);if(state!=='play')start();else firing=true;},{passive:true});
addEventListener('touchmove',e=>{if(e.touches[0])setMouse(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
addEventListener('touchend',()=>firing=false);

function fire(){if(fireCd>0)return;fireCd=7;
  const dx=Math.cos(aim),dy=Math.sin(aim);
  bullets.push({x:CX+dx*(R+4),y:CY+dy*(R+4),vx:dx*15,vy:dy*15});
  beep(900,.05,'square',.03);}

function spawn(){
  const a=Math.random()*Math.PI*2,dist=Math.hypot(W,H)/2+30;
  const fx=CX+Math.cos(a)*dist,fy=CY+Math.sin(a)*dist;
  let dx=CX-fx,dy=CY-fy,d=Math.hypot(dx,dy)||1;
  const sp=0.5+Math.random()*0.35+score/7000;
  const label=THREATS[(Math.random()*THREATS.length)|0];
  foes.push({x:fx,y:fy,vx:dx/d*sp,vy:dy/d*sp,label,r:14+label.length*3});}

function burst(px,py,col,n){for(let i=0;i<(n||14);i++)parts.push({x:px,y:py,vx:(Math.random()-.5)*7,vy:(Math.random()-.5)*7,life:1,col});}

function update(){
  aim=Math.atan2(mouse.y-CY,mouse.x-CX);
  if(fireCd>0)fireCd--;
  if(firing||keys[' '])fire();
  bullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;});
  bullets=bullets.filter(b=>b.x>-20&&b.x<W+20&&b.y>-20&&b.y<H+20);

  spawnT++;if(spawnT>=spawnEvery){spawnT=0;spawn();if(spawnEvery>34){spawnEvery-=0.4;}wave=1+Math.floor(score/400);}

  for(const f of foes){
    f.x+=f.vx;f.y+=f.vy;
    for(const b of bullets){if(b.dead)continue;
      if(Math.hypot(b.x-f.x,b.y-f.y)<f.r){b.dead=true;f.dead=true;score+=10;patched++;
        burst(f.x,f.y,GOLD);beep(340,.08,'square',.04);break;}}
    if(!f.dead&&Math.hypot(f.x-CX,f.y-CY)<HITR){f.dead=true;hp--;shake=16;flash=12;
      burst(CX,CY,RED,20);beep(95,.2,'sawtooth',.05);
      if(hp<=0){state='over';beep(70,.5,'sawtooth',.05);}}
  }
  bullets=bullets.filter(b=>!b.dead);foes=foes.filter(f=>!f.dead);
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=.96;p.vy*=.96;p.life-=.03;});parts=parts.filter(p=>p.life>0);
  if(shake>0)shake--;if(flash>0)flash--;
}

function core(cx,cy,s,col,ang){
  x.save();x.translate(cx,cy);
  if(typeof ang==='number')x.rotate(ang-Math.PI/2);
  x.strokeStyle=col;x.lineWidth=3;x.fillStyle='rgba(201,168,76,.12)';
  x.beginPath();x.moveTo(0,-s);x.lineTo(s*.8,-s*.55);x.lineTo(s*.8,s*.15);
  x.bezierCurveTo(s*.8,s*.7,s*.4,s*1.05,0,s*1.25);
  x.bezierCurveTo(-s*.4,s*1.05,-s*.8,s*.7,-s*.8,s*.15);
  x.lineTo(-s*.8,-s*.55);x.closePath();x.fill();x.stroke();
  x.restore();
  x.fillStyle=col;x.font='bold '+s+'px "Press Start 2P",monospace';x.textAlign='center';x.textBaseline='middle';
  x.fillText('S',cx,cy);
}

function draw(){
  x.save();
  if(shake>0)x.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
  x.fillStyle=INK;x.fillRect(0,0,W,H);
  x.strokeStyle='rgba(201,168,76,.05)';x.lineWidth=1;
  for(let i=0;i<W;i+=40){x.beginPath();x.moveTo(i,0);x.lineTo(i,H);x.stroke();}
  for(let j=0;j<H;j+=40){x.beginPath();x.moveTo(0,j);x.lineTo(W,j);x.stroke();}
  x.strokeStyle='rgba(122,99,48,.4)';x.beginPath();x.arc(CX,CY,HITR+8,0,7);x.stroke();

  if(state==='title'){
    x.textAlign='center';
    x.fillStyle=GOLD;x.font='30px "Press Start 2P",monospace';x.fillText('SHIELD',CX,CY-160);
    x.fillStyle=RED;x.fillText('CORE',CX,CY-122);
    x.fillStyle=GOLDL;x.font='12px "Press Start 2P",monospace';x.fillText('// DEFENDER',CX,CY-82);
    core(CX,CY+10,30,GOLD);
    x.fillStyle=GOLDL;x.font='10px "Press Start 2P",monospace';x.fillText('DEFENDS LE CORE',CX,CY+110);
    x.fillStyle=DIM;x.font='8px "Press Start 2P",monospace';x.fillText('LES MENACES CONVERGENT DE PARTOUT',CX,CY+135);
    x.fillStyle=blink()?GOLD:DIM;x.font='11px "Press Start 2P",monospace';x.fillText('CLIC / ESPACE = START',CX,CY+185);
    x.fillStyle=DIM;x.font='8px "Press Start 2P",monospace';x.fillText('SOURIS = VISER   MAINTIENS CLIC/ESPACE = TIRER   M = SON',CX,H-40);
    drawReticle();x.restore();return;
  }

  bullets.forEach(b=>{x.fillStyle=GOLDL;x.beginPath();x.arc(b.x,b.y,3,0,7);x.fill();});
  foes.forEach(f=>{
    const w=f.label.length*11+14,h=24;
    x.fillStyle='rgba(192,57,43,.16)';x.fillRect(f.x-w/2,f.y-h/2,w,h);
    x.strokeStyle=REDB;x.lineWidth=2;x.strokeRect(f.x-w/2,f.y-h/2,w,h);
    x.fillStyle=REDB;x.font='9px "Press Start 2P",monospace';x.textAlign='center';x.textBaseline='middle';
    x.fillText(f.label,f.x,f.y);
  });
  parts.forEach(p=>{x.globalAlpha=Math.max(0,p.life);x.fillStyle=p.col;x.fillRect(p.x,p.y,3,3);});x.globalAlpha=1;

  if(flash>0){x.strokeStyle='rgba(231,76,60,'+(flash/12)+')';x.lineWidth=4;x.beginPath();x.arc(CX,CY,HITR+6,0,7);x.stroke();}
  core(CX,CY,R,hp>1?GOLD:REDB,aim);

  x.textAlign='left';x.textBaseline='top';x.fillStyle=GOLD;x.font='12px "Press Start 2P",monospace';
  x.fillText('SCORE '+score,16,14);
  x.textAlign='right';x.fillText('WAVE '+wave,W-16,14);
  x.textAlign='center';x.fillStyle=hp>1?GOLD:RED;
  x.fillText('CORE '+'#'.repeat(Math.max(0,hp))+'-'.repeat(3-hp),CX,14);

  if(state==='over'){
    x.fillStyle='rgba(7,7,7,.8)';x.fillRect(0,0,W,H);x.textAlign='center';
    x.fillStyle=RED;x.font='28px "Press Start 2P",monospace';x.fillText('CORE BREACHED',CX,CY-110);
    x.fillStyle=GOLDL;x.font='12px "Press Start 2P",monospace';x.fillText(endLine,CX,CY-55);
    x.fillStyle=GOLD;x.font='16px "Press Start 2P",monospace';x.fillText('SCORE '+score,CX,CY+4);
    x.fillStyle=DIM;x.font='10px "Press Start 2P",monospace';x.fillText(patched+' menaces neutralisees',CX,CY+38);
    x.fillStyle=blink()?GOLD:DIM;x.font='11px "Press Start 2P",monospace';x.fillText('CLIC / R = REJOUER',CX,CY+100);
  }
  drawReticle();x.restore();
}
function drawReticle(){x.strokeStyle=blink()?GOLDL:GOLD;x.lineWidth=2;
  x.beginPath();x.arc(mouse.x,mouse.y,9,0,7);x.moveTo(mouse.x-14,mouse.y);x.lineTo(mouse.x-4,mouse.y);
  x.moveTo(mouse.x+4,mouse.y);x.lineTo(mouse.x+14,mouse.y);x.moveTo(mouse.x,mouse.y-14);x.lineTo(mouse.x,mouse.y-4);
  x.moveTo(mouse.x,mouse.y+4);x.lineTo(mouse.x,mouse.y+14);x.stroke();}
function blink(){return (Date.now()%900)<500;}

function loop(){if(state==='play')update();draw();requestAnimationFrame(loop);}
reset();loop();
</script>
</body>
</html>
